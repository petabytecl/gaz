syntax = "proto3";

package hello;

import "google/api/annotations.proto";

option go_package = "github.com/petabytecl/gaz/examples/vanguard/proto;hello";

// Greeter service demonstrates a simple RPC with HTTP annotations.
service Greeter {
  // SayHello returns a greeting for the given name.
  rpc SayHello (HelloRequest) returns (HelloReply) {
    option (google.api.http) = {
      post: "/v1/example/echo"
      body: "*"
    };
  }
}

// HelloRequest is the request message containing the user's name.
message HelloRequest {
  string name = 1;
}

// HelloReply is the response message containing the greeting.
message HelloReply {
  string message = 1;
}
